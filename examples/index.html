<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CLE PointCloud Viewer API Playground</title>
  <link rel="stylesheet" href="./index.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Instance Playground</p>
        <h1>CLE PointCloud Viewer API Playground</h1>
      </div>

      <div class="header-toolbar">
        <button id="addViewerBtn" class="btn" type="button">+ 인스턴스 추가</button>
        <span id="viewerCountChip" class="chip">viewers: 0</span>
      </div>

      <p id="headlineStatus" class="headline-status">인스턴스를 추가한 뒤 X/Y/Z 파일을 업로드해 렌더링하세요.</p>
    </header>

    <main class="stage">
      <div id="emptyState" class="empty-state">인스턴스가 없습니다. 상단 `+ 인스턴스 추가` 버튼을 눌러 시작하세요. 각 카드에서 X/Y/Z 파일 선택이 필수입니다.</div>
      <div id="viewerGrid" class="viewer-grid"></div>
    </main>
  </div>

  <script src="../dist/cle-pointcloud-viewer.js"></script>
  <script type="module" src="./index.js"></script>
</body>
</html>
